name: Build Ghost Session

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-vst-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install JUCE
        run: |
          git clone --depth 1 --branch 8.0.4 https://github.com/juce-framework/JUCE.git

      - name: Configure CMake
        run: |
          cd apps/plugin
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            2>&1 || true

      - name: Build VST3
        run: |
          cd apps/plugin
          cmake --build build --config Release -- -j$(sysctl -n hw.ncpu) 2>&1 | tail -50

      - name: List build output
        run: |
          find apps/plugin/build/GhostSession_artefacts -type f -name "*.vst3" -o -name "*.component" -o -name "*.app" 2>/dev/null || echo "No artefacts found"
          ls -laR apps/plugin/build/GhostSession_artefacts/ 2>/dev/null || echo "No artefacts dir"

      - name: Package plugins
        run: |
          mkdir -p artifacts
          cp -r apps/plugin/build/GhostSession_artefacts/Release/VST3/*.vst3 artifacts/ 2>/dev/null || true
          cp -r apps/plugin/build/GhostSession_artefacts/VST3/*.vst3 artifacts/ 2>/dev/null || true
          cp -r apps/plugin/build/GhostSession_artefacts/Release/AU/*.component artifacts/ 2>/dev/null || true
          cp -r apps/plugin/build/GhostSession_artefacts/AU/*.component artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload VST3 Plugin
        uses: actions/upload-artifact@v4
        with:
          name: Ghost-Session-VST3-macOS
          path: artifacts/
